basePath: /api/v1
definitions:
  auth.DeviceVerifyResponse:
    properties:
      device_id:
        type: string
      location:
        type: string
      valid:
        type: boolean
    type: object
  auth.LoginRequest:
    properties:
      device_info:
        type: string
      identifier:
        type: string
      password:
        type: string
      role:
        type: string
    required:
    - identifier
    - password
    - role
    type: object
  auth.LoginResponse:
    properties:
      access_token:
        type: string
      expires_in:
        description: seconds
        type: integer
      refresh_token:
        type: string
      user:
        $ref: '#/definitions/auth.UserInfo'
    type: object
  auth.RefreshRequest:
    properties:
      refresh_token:
        example: eyJhbG...
        type: string
    required:
    - refresh_token
    type: object
  auth.RefreshResponse:
    properties:
      access_token:
        type: string
      expires_in:
        type: integer
    type: object
  auth.RegisterRequest:
    properties:
      department:
        type: string
      full_name:
        type: string
      identifier:
        type: string
      password:
        minLength: 6
        type: string
      role:
        type: string
    required:
    - full_name
    - identifier
    - password
    type: object
  auth.UserInfo:
    properties:
      department:
        type: string
      full_name:
        type: string
      id:
        type: string
      identifier:
        type: string
      role:
        type: string
    type: object
  auth.VerifyDeviceRequest:
    properties:
      device_id:
        example: SCANNER-01
        type: string
      device_key:
        example: raw-key-here
        type: string
    required:
    - device_id
    - device_key
    type: object
  auth.VerifyRequest:
    properties:
      token:
        example: eyJhbG...
        type: string
    required:
    - token
    type: object
  auth.VerifyResponse:
    properties:
      user:
        $ref: '#/definitions/auth.UserInfo'
      valid:
        type: boolean
    type: object
  auth.docsLoginResponse:
    properties:
      data:
        $ref: '#/definitions/auth.LoginResponse'
      success:
        example: true
        type: boolean
    type: object
  auth.docsLogoutResponse:
    properties:
      data:
        properties:
          message:
            example: Logged out successfully
            type: string
        type: object
      success:
        example: true
        type: boolean
    type: object
  auth.docsRefreshResponse:
    properties:
      data:
        $ref: '#/definitions/auth.RefreshResponse'
      success:
        example: true
        type: boolean
    type: object
  auth.docsRegisterResponse:
    properties:
      data:
        $ref: '#/definitions/auth.UserInfo'
      success:
        example: true
        type: boolean
    type: object
  auth.docsVerifyDeviceResponse:
    properties:
      data:
        $ref: '#/definitions/auth.DeviceVerifyResponse'
      success:
        example: true
        type: boolean
    type: object
  auth.docsVerifyResponse:
    properties:
      data:
        $ref: '#/definitions/auth.VerifyResponse'
      success:
        example: true
        type: boolean
    type: object
  queue.CreateQueueRequest:
    properties:
      department:
        type: string
      description:
        type: string
      location:
        type: string
      max_rejoins:
        description: max rejoins per user per day; 0 = use default (3)
        type: integer
      max_size:
        description: daily capacity; 0 = unlimited
        type: integer
      title:
        type: string
    required:
    - title
    type: object
  queue.EntryResponse:
    properties:
      id:
        type: string
      joined_at:
        type: string
      position:
        type: integer
      queue_id:
        type: string
      served_at:
        type: string
      status:
        type: string
      user_id:
        type: string
    type: object
  queue.PositionResponse:
    properties:
      people_ahead:
        type: integer
      position:
        type: integer
      queue_id:
        type: string
      status:
        type: string
    type: object
  queue.QueueListResponse:
    properties:
      page:
        type: integer
      page_size:
        type: integer
      queues:
        items:
          $ref: '#/definitions/queue.QueueResponse'
        type: array
      total:
        type: integer
    type: object
  queue.QueueResponse:
    properties:
      created_at:
        type: string
      department:
        type: string
      description:
        type: string
      id:
        type: string
      location:
        type: string
      max_rejoins:
        type: integer
      max_size:
        type: integer
      owner_id:
        type: string
      served_today:
        type: integer
      status:
        type: string
      title:
        type: string
      waiting_count:
        type: integer
    type: object
  queue.ServeNextResponse:
    properties:
      message:
        type: string
      now_serving:
        $ref: '#/definitions/queue.EntryResponse'
      previously_serving:
        $ref: '#/definitions/queue.EntryResponse'
    type: object
  queue.docsEntriesListResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/queue.EntryResponse'
        type: array
      success:
        example: true
        type: boolean
    type: object
  queue.docsEntryResponse:
    properties:
      data:
        $ref: '#/definitions/queue.EntryResponse'
      success:
        example: true
        type: boolean
    type: object
  queue.docsPositionResponse:
    properties:
      data:
        $ref: '#/definitions/queue.PositionResponse'
      success:
        example: true
        type: boolean
    type: object
  queue.docsQueueListResponse:
    properties:
      data:
        $ref: '#/definitions/queue.QueueListResponse'
      success:
        example: true
        type: boolean
    type: object
  queue.docsQueueResponse:
    properties:
      data:
        $ref: '#/definitions/queue.QueueResponse'
      success:
        example: true
        type: boolean
    type: object
  queue.docsServeNextResponse:
    properties:
      data:
        $ref: '#/definitions/queue.ServeNextResponse'
      success:
        example: true
        type: boolean
    type: object
  response.ErrorBody:
    properties:
      error:
        $ref: '#/definitions/response.ErrorDetail'
      success:
        type: boolean
    type: object
  response.ErrorDetail:
    properties:
      code:
        type: string
      message:
        type: string
    type: object
  response.SuccessBody:
    properties:
      data: {}
      success:
        type: boolean
    type: object
host: localhost:8080
info:
  contact: {}
  description: Authentication and queue management system for the Tennda SaaS platform.
  title: Tennda Queue API
  version: "1.0"
paths:
  /auth/admin/register:
    post:
      consumes:
      - application/json
      description: Allows admins/super_admins to register new user accounts with assigned
        roles.
      parameters:
      - description: Registration details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/auth.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/auth.docsRegisterResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorBody'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorBody'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/response.ErrorBody'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/response.ErrorBody'
      security:
      - BearerAuth: []
      summary: Register user (Admin)
      tags:
      - auth
  /auth/login:
    post:
      consumes:
      - application/json
      description: Authenticates a user using identifier and password, returning access
        and refresh tokens.
      parameters:
      - description: Login credentials
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/auth.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/auth.docsLoginResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorBody'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorBody'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/response.ErrorBody'
      summary: Login a user
      tags:
      - auth
  /auth/logout:
    post:
      description: Revokes all refresh tokens for the authenticated user. Requires
        Bearer token.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/auth.docsLogoutResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorBody'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.ErrorBody'
      security:
      - BearerAuth: []
      summary: Logout user
      tags:
      - auth
  /auth/refresh:
    post:
      consumes:
      - application/json
      description: Exchanges a valid refresh token for a new access token.
      parameters:
      - description: Refresh Token
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/auth.RefreshRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/auth.docsRefreshResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorBody'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorBody'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/response.ErrorBody'
      summary: Refresh access token
      tags:
      - auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Registers a new user account with default role "user". Self-registering
        as admin or super_admin is forbidden.
      parameters:
      - description: Registration details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/auth.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/auth.docsRegisterResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorBody'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/response.ErrorBody'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/response.ErrorBody'
      summary: Register a new user
      tags:
      - auth
  /auth/verify:
    post:
      consumes:
      - application/json
      description: Validates an access token and returns the embedded user claims.
        For internal service use only.
      parameters:
      - description: Access Token
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/auth.VerifyRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/auth.docsVerifyResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorBody'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorBody'
      summary: Verify access token (Internal)
      tags:
      - auth
  /auth/verify-device:
    post:
      consumes:
      - application/json
      description: Authenticates a hardware QR scanner by its device ID and key. For
        internal network use only.
      parameters:
      - description: Device Credentials
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/auth.VerifyDeviceRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/auth.docsVerifyDeviceResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorBody'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorBody'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/response.ErrorBody'
      summary: Verify hardware scanner (Internal)
      tags:
      - auth
  /queues:
    get:
      description: Returns a paginated list of queues, optionally filtered by status.
      parameters:
      - description: Filter by status (open, closed, paused)
        in: query
        name: status
        type: string
      - description: Page number (default 1)
        in: query
        name: page
        type: integer
      - description: Page size (default 20, max 50)
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/queue.docsQueueListResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorBody'
      security:
      - BearerAuth: []
      summary: List queues
      tags:
      - queues
    post:
      consumes:
      - application/json
      description: Creates a new queue owned by the authenticated user.
      parameters:
      - description: Queue details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/queue.CreateQueueRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/queue.docsQueueResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorBody'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorBody'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/response.ErrorBody'
      security:
      - BearerAuth: []
      summary: Create a queue
      tags:
      - queues
  /queues/{id}:
    get:
      description: Returns queue details including waiting count and daily served
        count.
      parameters:
      - description: Queue UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/queue.docsQueueResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorBody'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.ErrorBody'
      security:
      - BearerAuth: []
      summary: Get queue details
      tags:
      - queues
  /queues/{id}/close:
    post:
      description: Closes the queue, marking all waiting entries as left. Only the
        queue owner or admins can call this.
      parameters:
      - description: Queue UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.SuccessBody'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorBody'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/response.ErrorBody'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.ErrorBody'
      security:
      - BearerAuth: []
      summary: Close a queue
      tags:
      - queues
  /queues/{id}/entries:
    get:
      description: Returns all entries for a queue, optionally filtered by status.
        Only the queue owner or admins can view entries.
      parameters:
      - description: Queue UUID
        in: path
        name: id
        required: true
        type: string
      - description: Filter by entry status (waiting, serving, served, left)
        in: query
        name: status
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/queue.docsEntriesListResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorBody'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/response.ErrorBody'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.ErrorBody'
      security:
      - BearerAuth: []
      summary: List queue entries
      tags:
      - queues
  /queues/{id}/join:
    post:
      description: Adds the authenticated user to the specified queue. Users can rejoin
        after leaving/being served, up to the queue's rejoin limit.
      parameters:
      - description: Queue UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/queue.docsEntryResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorBody'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.ErrorBody'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/response.ErrorBody'
      security:
      - BearerAuth: []
      summary: Join a queue
      tags:
      - queues
  /queues/{id}/leave:
    post:
      description: Allows the authenticated user to voluntarily leave the queue.
      parameters:
      - description: Queue UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.SuccessBody'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorBody'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.ErrorBody'
      security:
      - BearerAuth: []
      summary: Leave a queue
      tags:
      - queues
  /queues/{id}/pause:
    post:
      description: Pauses the queue so no new users can join. Existing entries remain.
        Only the queue owner or admins can call this.
      parameters:
      - description: Queue UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.SuccessBody'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorBody'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/response.ErrorBody'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.ErrorBody'
      security:
      - BearerAuth: []
      summary: Pause a queue
      tags:
      - queues
  /queues/{id}/position:
    get:
      description: Returns the authenticated user's position and number of people
        ahead.
      parameters:
      - description: Queue UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/queue.docsPositionResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorBody'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.ErrorBody'
      security:
      - BearerAuth: []
      summary: Get queue position
      tags:
      - queues
  /queues/{id}/resume:
    post:
      description: Resumes a paused queue, allowing new users to join again. Only
        the queue owner or admins can call this.
      parameters:
      - description: Queue UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.SuccessBody'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorBody'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/response.ErrorBody'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.ErrorBody'
      security:
      - BearerAuth: []
      summary: Resume a queue
      tags:
      - queues
  /queues/{id}/serve-next:
    post:
      description: Marks the currently serving person as served and promotes the next
        waiting person. Only the queue owner or admins can call this.
      parameters:
      - description: Queue UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/queue.docsServeNextResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorBody'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/response.ErrorBody'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.ErrorBody'
      security:
      - BearerAuth: []
      summary: Serve next person
      tags:
      - queues
securityDefinitions:
  BearerAuth:
    description: Type "Bearer" followed by a space and JWT token.
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
